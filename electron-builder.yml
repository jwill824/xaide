appId: com.xaide.app
productName: Xaide
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - node_modules/**/*
  - package.json
mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.developer-tools
  darkModeSupport: true
nativeRebuilder: parallel
